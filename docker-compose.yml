services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crypto_agent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      API_PREFIX: /api
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crypto_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DB_AUTO_CREATE: "true"
      FAISS_DIR: /app/data/faiss
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDINGS_MODEL: ${GEMINI_EMBEDDINGS_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDINGS_DIM: ${GEMINI_EMBEDDINGS_DIM:-1536}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crypto_agent
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FAISS_DIR: /app/data/faiss
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDINGS_MODEL: ${GEMINI_EMBEDDINGS_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDINGS_DIM: ${GEMINI_EMBEDDINGS_DIM:-1536}
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "-l", "INFO"]
    volumes:
      - backend_data:/app/data
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crypto_agent
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FAISS_DIR: /app/data/faiss
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDINGS_MODEL: ${GEMINI_EMBEDDINGS_MODEL:-gemini-embedding-001}
      GEMINI_EMBEDDINGS_DIM: ${GEMINI_EMBEDDINGS_DIM:-1536}
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "beat", "-l", "INFO"]
    volumes:
      - backend_data:/app/data
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_BASE: http://localhost:8000
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_data:
